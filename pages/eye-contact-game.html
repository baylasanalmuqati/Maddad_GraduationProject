<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | لعبة التواصل البصري</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background:#F3F8FF; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">

  <div style="background:white; padding:30px; border-radius:24px; box-shadow:0 18px 40px rgba(0,0,0,0.08); text-align:center; max-width:900px; width:100%;">
    <h1 style="color:#6F58B4; margin-bottom:20px;">لعبة التواصل البصري</h1>

    <!-- هنا تشتغل اللعبة -->
    <div id="unity-container" style="width:100%; height:500px; border-radius:16px; overflow:hidden;"></div>

    <button onclick="window.location.href='games.html'"
      style="margin-top:20px; border:none; background:#6F58B4; color:white; border-radius:999px; padding:14px 24px; font-size:18px; cursor:pointer;">
      العودة
    </button>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>

  <script>
    // 1. جيب الـ token المحفوظ من تسجيل الدخول
    const token = sessionStorage.getItem("maddadToken");

    if (!token) {
      alert("يرجى تسجيل الدخول أولاً");
      window.location.href = "child-login.html";
    }

    // 2. شغّل لعبة Unity
    var script = document.createElement("script");
    script.src = "../eye_contact_game/Build/unity-eye-contact.loader.js";
    script.onload = function () {
      createUnityInstance(document.getElementById("unity-container"), {
        dataUrl: "../eye_contact_game/Build/unity-eye-contact.data",
        frameworkUrl: "../eye_contact_game/Build/unity-eye-contact.framework.js",
        codeUrl: "../eye_contact_game/Build/unity-eye-contact.wasm",
      }).then(function (unityInstance) {

        // 3. بعد ما اللعبة تشتغل، ارسل الـ token لها
        setTimeout(function () {
          unityInstance.SendMessage("APIManager", "SetToken", token);
        }, 3000);

      });
    };
    document.body.appendChild(script);
  </script>

</body>
</html>
