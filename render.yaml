services:
  - type: web
    name: maddad-backend
    env: python
    pythonVersion: 3.11
    buildCommand: |
      pip install --upgrade pip
      pip install --only-binary :all: -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        scope: run
